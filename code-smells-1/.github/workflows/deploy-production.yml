name: Cloud Run production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: code-smells-1-production
      REGION: europe-west1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (production service account JSON)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON_PRODUCTION }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID_PRODUCTION }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image (production)
        run: |
          set -eux
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID_PRODUCTION }}"
          REGION="${{ env.REGION }}"
          REPOSITORY="apps"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/code-smells-1:${GITHUB_SHA}"
          docker build -t "${IMAGE}" -f code-smells-1/Dockerfile code-smells-1
          docker push "${IMAGE}"
          echo "DEPLOY_IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy to Cloud Run
        run: |
          set -eux
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --project "${{ secrets.GCP_PROJECT_ID_PRODUCTION }}" \
            --region "${{ env.REGION }}" \
            --image "${DEPLOY_IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-secrets "MONGODB_URL=mongodb-url:latest,DATABASE_NAME=database-name:latest"
